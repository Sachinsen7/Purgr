tool: node
rules:
  - pattern: 'node_modules/.*'
    description: "Node.js dependencies (can be large)"
    score_adjustment: 10
  - pattern: 'npm-cache/.*'
    description: "NPM cache directory"
    score_adjustment: 25
  - pattern: '\.npm/.*'
    description: "NPM internal cache"
    score_adjustment: 20
  - pattern: '.*\.tgz$'
    description: "NPM package archives"
    score_adjustment: 15
  - pattern: 'yarn/cache/.*'
    description: "Yarn cache directory"
    score_adjustment: 25
  - pattern: '\.yarn/.*'
    description: "Yarn internal files"
    score_adjustment: 20
